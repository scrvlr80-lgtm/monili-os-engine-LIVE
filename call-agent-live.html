<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shaq-OS · Llamada de voz</title>
<script crossorigin src="https://unpkg.com/@daily-co/daily-js@latest/dist/daily-iframe.js"></script>
<script src="https://accounts.google.com/gsi/client" async></script>
<!-- Datos de idioma: interfaz (82 idiomas) + GDPR (8 + fallback EN) -->
<script src="ui-languages.js"></script>
<script src="gdpr-voice.js"></script>
<style>
  :root{
    --bg:#1c1e21;
    --panel:#141618;
    --panel-2:#1b1e20;
    --line:#2a2f31;
    --cyan:#2fd7c7;
    --cyan-soft:rgba(47,215,199,0.14);
    --cyan-glow:rgba(47,215,199,0.45);
    --text:#f2f4f4;
    --text-dim:#9aa2a2;
    --danger:#ff4d5e;
    --danger-glow:rgba(255,77,94,0.4);
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",system-ui,Arial,sans-serif;}
  body{
    background:var(--bg);color:var(--text);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important;}
  }

  /* ---------- CONTENITORE UNICO DEL BOT ---------- */
  .agent{
    width:390px;max-width:100%;
    background:linear-gradient(180deg,#16191b,#111315);
    border:1px solid var(--line);
    border-radius:22px;overflow:hidden;
    box-shadow:0 24px 70px rgba(0,0,0,0.55);
    position:relative;
  }
  .agent-header{
    padding:16px 18px;display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:700;
    letter-spacing:.6px;text-transform:uppercase;color:var(--text-dim);}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);
    box-shadow:0 0 10px var(--cyan);}

  /* selettore lingua nel header */
  .lang-btn{
    display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;
    background:var(--panel-2);border:1px solid var(--line);
    color:var(--text);padding:7px 11px;border-radius:999px;font-size:12px;
    transition:border-color .15s ease;
  }
  .lang-btn:hover{border-color:var(--cyan);}
  .lang-btn .globe{font-size:13px;}
  .lang-btn .flag{font-size:14px;}
  .lang-btn .chev{font-size:9px;color:var(--text-dim);}

  /* dropdown lingue */
  .lang-menu{
    position:absolute;top:56px;right:14px;z-index:40;
    width:210px;max-height:320px;overflow-y:auto;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    box-shadow:0 18px 46px rgba(0,0,0,.6);padding:6px;display:none;
  }
  .lang-menu.open{display:block;}
  .lang-menu .search{
    width:100%;padding:9px 11px;margin-bottom:6px;border-radius:9px;
    background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    font-size:13px;outline:none;
  }
  .lang-menu .search:focus{border-color:var(--cyan);}
  .lang-opt{
    display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;
    cursor:pointer;font-size:13.5px;color:var(--text);
  }
  .lang-opt:hover{background:var(--cyan-soft);}
  .lang-opt.active{color:var(--cyan);}
  .lang-opt .flag{font-size:16px;}

  /* ---------- CORPO ---------- */
  .agent-body{padding:26px 22px 24px;min-height:340px;
    display:flex;flex-direction:column;align-items:center;text-align:center;}

  /* ---- GDPR (schermata d'apertura) ---- */
  .gdpr{display:flex;flex-direction:column;width:100%;animation:fade .35s ease;}
  .gdpr h2{font-size:15px;letter-spacing:.4px;margin-bottom:12px;color:var(--cyan);
    text-transform:uppercase;}
  .gdpr .intro{font-size:13px;color:var(--text);margin-bottom:14px;line-height:1.5;}
  .gdpr .scroll{
    text-align:left;max-height:230px;overflow-y:auto;padding:14px 15px;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    font-size:11.7px;line-height:1.55;color:var(--text-dim);margin-bottom:16px;
  }
  .gdpr .scroll p{margin-bottom:9px;}
  .gdpr .scroll strong{color:var(--text);font-weight:600;}
  .gdpr .actions{display:flex;gap:10px;}
  .btn{flex:1;padding:13px;border-radius:12px;font-size:13.5px;font-weight:600;
    cursor:pointer;border:1px solid transparent;transition:all .15s ease;user-select:none;}
  .btn-accept{background:var(--cyan);color:#06201d;box-shadow:0 8px 22px var(--cyan-glow);}
  .btn-accept:hover{transform:translateY(-1px);}
  .btn-decline{background:transparent;border-color:var(--line);color:var(--text-dim);}
  .btn-decline:hover{border-color:var(--text-dim);color:var(--text);}

  /* ---- CHIAMATA (dopo consenso) ---- */
  .call{display:none;flex-direction:column;align-items:center;width:100%;animation:fade .35s ease;}
  .call.show{display:flex;}
  .gdpr.hide{display:none;}

  .avatar{
    width:104px;height:104px;border-radius:50%;position:relative;margin:6px 0 18px;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 40%,var(--cyan-soft),transparent 70%);
  }
  .avatar::before{content:"";position:absolute;inset:0;border-radius:50%;
    border:2px solid var(--cyan);opacity:.5;animation:ring 2.4s ease-out infinite;
    animation-play-state:paused;}
  .avatar.live::before{animation-play-state:running;}
  @keyframes ring{0%{transform:scale(.85);opacity:.6;}70%{transform:scale(1.28);opacity:0;}100%{opacity:0;}}
  .avatar .core{width:70px;height:70px;border-radius:50%;
    background:linear-gradient(145deg,#1c2020,#101313);border:1px solid #2a2f2f;
    display:flex;align-items:center;justify-content:center;font-size:26px;}

  .assistant-name{font-size:16px;font-weight:700;margin-bottom:4px;}
  .status{font-size:12.5px;color:var(--cyan);letter-spacing:.3px;margin-bottom:20px;
    min-height:16px;display:flex;align-items:center;gap:6px;}
  .status .rec{width:6px;height:6px;border-radius:50%;background:var(--cyan);}

  .wave{display:flex;align-items:flex-end;gap:4px;height:30px;margin-bottom:20px;}
  .wave span{width:4px;border-radius:2px;background:var(--cyan);opacity:.85;
    animation:wv 1.1s ease-in-out infinite;animation-play-state:paused;}
  .wave.live span{animation-play-state:running;}
  .wave span:nth-child(1){height:12px;animation-delay:0s;}
  .wave span:nth-child(2){height:22px;animation-delay:.1s;}
  .wave span:nth-child(3){height:30px;animation-delay:.2s;}
  .wave span:nth-child(4){height:17px;animation-delay:.3s;}
  .wave span:nth-child(5){height:26px;animation-delay:.4s;}
  .wave span:nth-child(6){height:14px;animation-delay:.5s;}
  .wave span:nth-child(7){height:20px;animation-delay:.6s;}
  @keyframes wv{0%,100%{transform:scaleY(.4);}50%{transform:scaleY(1);}}

  .timer{font-size:12.5px;color:var(--text-dim);margin-bottom:8px;font-variant-numeric:tabular-nums;}
  .mic-status{font-size:11.5px;margin-bottom:18px;color:var(--text-dim);min-height:15px;}

  /* ---- TRASCRIZIONE LIVE ---- */
  .tr-toggle{display:none;align-items:center;justify-content:center;gap:7px;margin:14px auto 0;
    padding:8px 16px;border-radius:999px;cursor:pointer;background:transparent;
    border:1px solid var(--line);color:var(--text-dim);font-size:12px;letter-spacing:.4px;
    font-family:inherit;transition:border-color .15s,color .15s;}
  .tr-toggle:hover{border-color:var(--cyan);color:var(--cyan);}
  .tr-toggle .dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);
    box-shadow:0 0 7px var(--cyan);}
  .tr-panel{max-height:0;overflow:hidden;transition:max-height .35s ease;margin-top:12px;
    border:1px solid transparent;border-radius:12px;text-align:left;}
  .tr-panel.open{max-height:300px;border-color:var(--line);background:rgba(0,0,0,.22);}
  .tr-body{max-height:230px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;
    gap:8px;scrollbar-width:thin;scrollbar-color:var(--line) transparent;}
  .tr-empty{color:var(--text-dim);font-size:12px;text-align:center;padding:14px 6px;}
  .tr-msg{max-width:90%;padding:7px 11px;border-radius:10px;font-size:12.5px;line-height:1.45;
    animation:trIn .22s ease;}
  @keyframes trIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
  .tr-msg.bot{align-self:flex-start;background:var(--panel-2);border:1px solid var(--line);
    border-left:2px solid var(--cyan);}
  .tr-msg.user{align-self:flex-end;background:var(--cyan-soft);
    border:1px solid rgba(47,215,199,.35);border-right:2px solid var(--cyan);}
  .tr-msg .who{display:block;font-size:9px;letter-spacing:1.4px;text-transform:uppercase;
    margin-bottom:3px;color:var(--text-dim);}
  .tr-msg.bot .who{color:var(--cyan);}
  .tr-foot{padding:10px 12px;border-top:1px solid var(--line);}
  .tr-pdf{width:100%;padding:10px;background:transparent;border:1px solid var(--cyan);
    color:var(--cyan);border-radius:9px;font-family:inherit;font-size:12.5px;font-weight:600;
    cursor:pointer;transition:all .15s;}
  .tr-pdf:hover{background:var(--cyan-soft);}
  .tr-pdf:disabled{opacity:.4;cursor:not-allowed;}

  /* ---- IL TASTO CORNETTA (la firma) ---- */
  .phone-wrap{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:2px;}
  .side-ctrl{width:48px;height:48px;border-radius:50%;background:var(--panel-2);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
    font-size:17px;color:var(--text);cursor:pointer;transition:all .15s ease;user-select:none;}
  .side-ctrl:hover{background:#22262a;}
  .side-ctrl.active{background:var(--cyan-soft);border-color:var(--cyan);color:var(--cyan);}
  .side-ctrl.muted{background:rgba(255,77,94,.15);border-color:var(--danger);color:var(--danger);}
  .side-ctrl.hidden{visibility:hidden;}

  .phone{
    width:66px;height:66px;border-radius:50%;cursor:pointer;user-select:none;
    display:flex;align-items:center;justify-content:center;font-size:26px;
    background:var(--cyan);color:#06201d;border:none;
    box-shadow:0 8px 24px var(--cyan-glow);transition:transform .15s ease,background .2s ease;
    position:relative;
  }
  .phone:hover{transform:scale(1.05);}
  /* stato: connessione → pulsa ciano */
  .phone.connecting{animation:phonepulse 1.15s ease-in-out infinite;}
  @keyframes phonepulse{
    0%{box-shadow:0 0 0 0 var(--cyan-glow);}
    70%{box-shadow:0 0 0 18px rgba(47,215,199,0);}
    100%{box-shadow:0 0 0 0 rgba(47,215,199,0);}
  }
  /* stato: in chiamata → tasto riaggancia (stesso ciano, cornetta ruotata) */
  .phone.hangup{background:var(--cyan);}
  .phone.hangup .ico{transform:rotate(135deg);}
  .phone .ico{transition:transform .25s ease;line-height:1;}

  .footer-note{margin-top:20px;font-size:10.5px;color:#5c6363;letter-spacing:.3px;}

  .error-box{display:none;margin-top:14px;padding:10px 13px;background:rgba(255,77,94,.1);
    border:1px solid var(--danger);color:var(--danger);border-radius:10px;font-size:11.5px;text-align:left;}
  .error-box.visible{display:block;}

  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  /* animazione typing del cambio lingua: cursore */
  .typing::after{content:"▏";color:var(--cyan);animation:blink 1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}
</style>
</head>
<body>

<div class="agent" id="agent">
  <div class="agent-header">
    <div class="brand"><span class="dot"></span> <span id="brandName">Shaq-OS</span></div>
    <div class="lang-btn" id="langBtn">
      <span class="globe">🌐</span>
      <span class="flag" id="langFlag">🇪🇸</span>
      <span class="chev">▾</span>
    </div>
  </div>

  <div class="lang-menu" id="langMenu">
    <input class="search" id="langSearch" placeholder="…">
    <div id="langList"></div>
  </div>

  <div class="agent-body">

    <!-- GDPR: schermata d'apertura -->
    <div class="gdpr" id="gdpr">
      <h2 id="gdprTitle">—</h2>
      <div class="intro" id="gdprIntro">—</div>
      <div class="scroll" id="gdprScroll"></div>

      <!-- Login Google (verifica identità prima di parlare) -->
      <div id="gdpr-google-wrap" style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px;">

        <div id="gdpr-google-ok" style="display:none;align-items:center;gap:8px;justify-content:center;padding:10px 14px;border-radius:8px;background:rgba(52,168,83,0.12);border:1px solid rgba(52,168,83,0.4);color:#34a853;font-size:13px;font-weight:600;">
          <span>✓</span><span id="gdpr-google-ok-email">verificado</span>

      </div>

      <div class="actions">
        <button class="btn btn-decline" id="gdprDecline">—</button>
        <button class="btn btn-accept" id="gdprAccept">—</button>
      </div>
    </div>

    <!-- Overlay rate-limit: inserimento password (sblocco) -->
    <div class="gdpr hide" id="pwdScreen">
      <h2 id="pwdTitle">Tiempo agotado</h2>
      <div class="intro" id="pwdIntro">—</div>
      <input class="search" id="pwdInput" placeholder="Password" style="margin-bottom:14px;text-align:center;letter-spacing:2px;">
      <div class="actions">
        <button class="btn btn-decline" id="pwdBack">—</button>
        <button class="btn btn-accept" id="pwdSubmit">Desbloquear</button>
      </div>
      <button class="btn" id="contactStaff" style="width:100%;margin-top:12px;background:rgba(37,211,102,0.14);border:1px solid #25d366;color:#25d366;">
        💬 <span id="contactStaffLabel">Contactar con el personal</span>
      </button>
      <div class="error-box" id="pwdError" style="margin-top:12px;"></div>
    </div>

    <!-- CHIAMATA -->
    <div class="call" id="call">
      <div class="avatar" id="avatar"><div class="core">🎙️</div></div>
      <div class="assistant-name" id="assistantName">Shaq-OS</div>
      <div class="status" id="status"><span class="rec"></span> <span id="statusText">—</span></div>
      <div class="wave" id="wave"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
      <div class="timer" id="timer">00:00 <span id="countdownIcon" title="" style="display:none;margin-left:6px;">⏳</span></div>
      <div class="mic-status" id="micStatus">—</div>

      <div class="phone-wrap">
        <div class="side-ctrl hidden" id="muteBtn" title="Mute">🎤</div>
        <button class="phone" id="phoneBtn"><span class="ico" id="phoneIco">📞</span></button>
        <div class="side-ctrl hidden active" id="speakerBtn" title="Speaker">🔊</div>
      </div>

      <div class="error-box" id="errorBox"></div>
      <button class="btn btn-accept" id="shaqBtn" style="display:none;width:100%;margin-top:16px;">
        ↩ <span id="shaqBtnLabel">Volver con Shaq</span>
      </button>

      <!-- TRASCRIZIONE LIVE -->
      <button class="tr-toggle" id="trToggle"><span class="dot"></span><span id="trToggleLabel">Transcripción</span></button>
      <div class="tr-panel" id="trPanel">
        <div class="tr-body" id="trBody"><div class="tr-empty" id="trEmpty">—</div></div>
        <div class="tr-foot"><button class="tr-pdf" id="trPdf" disabled>Descargar PDF</button></div>
      </div>
      <div class="footer-note" id="footerNote">—</div>
    </div>

  </div>
</div>

<audio id="remoteAudio" autoplay></audio>

<script>
/* =====================================================================
   CONFIG
===================================================================== */
const BACKEND_URL = "https://monili-os-engine.onrender.com";
const TENANT_SLUG = "shaq-main";

/* Google login (verifica identità nel GDPR). Il dominio GitHub Pages deve
   essere autorizzato nella Google Cloud Console (origini JavaScript). */

/* Contatto staff (bottone WhatsApp nella schermata rate-limit).
   Numeri gestiti dall'impresa. Il messaggio precompilato spiega la richiesta. */

const STAFF_WA_MSG = "Hola, me gustaría solicitar una contraseña de acceso para el asistente de voz de Shaq-OS.";

/* Titolare / email da interpolare nel GDPR ({EMP} e {MAIL}) */

/* Origini fidate per i postMessage (bottone lingua esterno, se usato in iframe) */

/* =====================================================================

const LANG_NAMES = {

};

const SEL_TITLES = {"es-ES":"Buscar idioma…","en-US":"Search language…","it-IT":"Cerca lingua…",
  "fr-FR":"Chercher…","de-DE":"Sprache suchen…","pt-PT":"Procurar…","ca-ES":"Cercar idioma…"};

/* le 8 lingue con GDPR proprio; tutte le altre → EN nel GDPR */
const GDPR_MAIN = ["es-ES","ca-ES","en-US","it-IT","fr-FR","de-DE","pt-PT","nl-NL"];

/* =====================================================================
   STATO
===================================================================== */
let currentLang = "es-ES";     // lingua UI+GDPR corrente
let selectedLang = "es-ES";    // lingua da passare al backend vocale
let consentGiven = false;
let callObject=null, micStream=null, timerInterval=null, seconds=0;
let callRemainingSec=-1;  // secondi concessi per la chiamata corrente (-1 = illimitato)
let isMuted=false, isSpeakerOn=true, callActive=false, connecting=false;

/* refs */
const $ = id => document.getElementById(id);
const langBtn=$("langBtn"), langMenu=$("langMenu"), langList=$("langList"),
      langSearch=$("langSearch"), langFlag=$("langFlag");
const gdprEl=$("gdpr"), callEl=$("call");
const statusText=$("statusText"), micStatus=$("micStatus"), errorBox=$("errorBox"),
      avatar=$("avatar"), wave=$("wave"), timerEl=$("timer"),
      phoneBtn=$("phoneBtn"), phoneIco=$("phoneIco"),
      muteBtn=$("muteBtn"), speakerBtn=$("speakerBtn"), remoteAudio=$("remoteAudio");

/* =====================================================================
   t(): traduzione UI con fallback EN
===================================================================== */
function t(key){
  const L = (window.UI && (UI[currentLang]||UI["en-US"]||UI["es-ES"]))||{};
  return (L && L[key]) || (window.UI && UI["en-US"] && UI["en-US"][key]) || key;
}

/* =====================================================================
   ANIMAZIONE CAMBIO LINGUA (rAF + frame pre-calcolati + Array.from)
   - niente setTimeout (throttling in background = freeze)
   - tempo reale accumulato
   - anti-race con runId
   - recupero su visibilitychange/focus
===================================================================== */
let runId = 0;
const animTargets = []; // {el, text}

function buildFrames(oldStr, newStr){
  const o = Array.from(oldStr||"");
  const n = Array.from(newStr||"");
  const frames = [];
  for(let k=o.length;k>=0;k--) frames.push(o.slice(0,k).join(""));      // cancella indietro
  for(let i=0;i<6;i++) frames.push("");                                  // pausa
  for(let k=1;k<=n.length;k++) frames.push(n.slice(0,k).join(""));       // riscrive avanti
  return frames;
}

function animateElement(el, newText, myRun){
  const frames = buildFrames(el.textContent, newText);
  let idx=0, acc=0, last=performance.now();
  const STEP=18; // ms per frame
  el.classList.add("typing");
  function tick(now){
    if(myRun!==runId){ return; }
    acc += now-last; last=now;
    while(acc>=STEP && idx<frames.length){ el.textContent=frames[idx++]; acc-=STEP; }
    if(idx<frames.length){ requestAnimationFrame(tick); }
    else { el.textContent=newText; el.classList.remove("typing"); }
  }
  requestAnimationFrame(tick);
}

function snapToTarget(){
  // in caso di freeze/background: salta ai testi finali
  animTargets.forEach(t=>{ t.el.textContent=t.text; t.el.classList.remove("typing"); });
}

/* applica la lingua a TUTTA l'interfaccia, con animazione sui testi chiave */
function applyUILang(animate){
  const myRun = ++runId;
  document.documentElement.lang = currentLang.split("-")[0];
  langFlag.textContent = FLAGS[currentLang] || "🌐";
  langSearch.placeholder = SEL_TITLES[currentLang] || SEL_TITLES["en-US"];

  // testi UI sempre validi
  const map = [
    [$("assistantName"), t("name")],
    [$("brandName"), "Shaq-OS"],
    [$("footerNote"), t("secure")],
  ];
  // lo status dipende dallo stato della chiamata: va ritradotto SEMPRE,
  // così quando l'utente cambia lingua parlando anche "In ascolto…"
  // passa alla nuova lingua.
  if(callActive)       map.push([statusText, t("listening")]);
  else if(connecting)  map.push([statusText, t("connecting")]);
  else                 map.push([statusText, "\u2014"]);  /* fuori chiamata: niente "Conexión…" */

  animTargets.length=0;
  map.forEach(([el,txt])=>{ if(el) animTargets.push({el,text:txt}); });

  if(animate){
    animTargets.forEach(({el,text})=>animateElement(el,text,myRun));
  }else{
    snapToTarget();
  }
  applyGdprLang();
  renderLangList();
  try{ trApplyLang(); }catch(e){}
}

/* =====================================================================
   GDPR
===================================================================== */
function gdprPack(lang){
  const key = GDPR_MAIN.includes(lang) ? lang : "en-US";
  return (window.GDPR_VOICE && (GDPR_VOICE[key]||GDPR_VOICE["en-US"])) || null;
}
function interp(s){ return (s||"").replace(/\{EMP\}/g,GDPR_EMP).replace(/\{MAIL\}/g,GDPR_MAIL); }

function applyGdprLang(){
  const g = gdprPack(currentLang);
  if(!g) return;
  $("gdprTitle").textContent = g.title;
  $("gdprIntro").textContent = interp(g.intro);
  const order = ["who","data","voice","purpose","legal","retention","recipients","rights","ai","age"];
  $("gdprScroll").innerHTML = order.map(k=>`<p>${interp(g[k]||"")}</p>`).join("");
  $("gdprAccept").textContent = g.accept;
  $("gdprDecline").textContent = g.decline;
}

/* =====================================================================
   SELETTORE LINGUA
===================================================================== */
function browserPref(){
  const b=(navigator.language||"en").toLowerCase();
  const root=b.split("-")[0];
  // priorità regionale per lo spazio iberico (caso d'uso Barcellona)
  if(root==="ca") return ["ca-ES","es-ES","en-US"];
  if(root==="es") return ["es-ES","ca-ES","en-US"];
  // per ogni altra lingua del browser: mettila in cima se supportata,
  // con inglese e spagnolo come reti di sicurezza
  const match=Object.keys(LANG_NAMES).find(l=>l.toLowerCase().startsWith(root+"-"))
           || Object.keys(LANG_NAMES).find(l=>l.toLowerCase().startsWith(root));
  if(match) return [match,"en-US","es-ES"];
  return ["en-US","es-ES"];
}
function orderedLangs(){
  const pref=browserPref();
  const all=Object.keys(LANG_NAMES);
  const rest=all.filter(l=>!pref.includes(l)).sort((a,b)=>LANG_NAMES[a].localeCompare(LANG_NAMES[b]));
  return [...pref.filter(l=>all.includes(l)),...rest];
}
function renderLangList(filter){
  const f=(filter||"").toLowerCase();
  const langs=orderedLangs().filter(l=>!f || LANG_NAMES[l].toLowerCase().includes(f) || l.toLowerCase().includes(f));
  langList.innerHTML = langs.map(l=>
    `<div class="lang-opt ${l===currentLang?'active':''}" data-lang="${l}">
       <span class="flag">${FLAGS[l]||"🌐"}</span><span>${LANG_NAMES[l]}</span>
     </div>`).join("");
  langList.querySelectorAll(".lang-opt").forEach(o=>{
    o.addEventListener("click",()=>{ chooseLang(o.dataset.lang); });
  });
}
langBtn.addEventListener("click",()=>{
  langMenu.classList.toggle("open");
  if(langMenu.classList.contains("open")){ langSearch.value=""; renderLangList(); langSearch.focus(); }
});
langSearch.addEventListener("input",e=>renderLangList(e.target.value));
document.addEventListener("click",e=>{
  if(!langMenu.contains(e.target)&&!langBtn.contains(e.target)) langMenu.classList.remove("open");
});

/* scelta lingua dal bottone interno → anima UI + memorizza per il bot */
function chooseLang(lang){
  if(!lang||lang===currentLang){ langMenu.classList.remove("open"); return; }
  currentLang=lang; selectedLang=lang;
  try{ localStorage.setItem("shaq_global_lang",lang); }catch(e){}
  langMenu.classList.remove("open");
  applyUILang(true);   // con animazione
}

/* cambio lingua ESTERNO (voce del bot, o bottone Wix) → stessa animazione */
function normalizeLang(lang){
  if(!lang) return null;
  if(LANG_NAMES[lang]) return lang;           // già xx-XX valido
  const root=String(lang).split("-")[0].toLowerCase();
  // preferisci il match "root-XX" (es: es → es-ES), poi qualsiasi che inizia per root
  return Object.keys(LANG_NAMES).find(l=>l.toLowerCase().startsWith(root+"-"))
      || Object.keys(LANG_NAMES).find(l=>l.toLowerCase().startsWith(root))
      || null;
}
function setVoiceLang(lang, fromVoice){
  const norm=normalizeLang(lang);
  if(!norm) return;
  if(norm===currentLang) return;
  currentLang=norm;
  if(!fromVoice) selectedLang=norm; // dal bottone Wix aggiorna anche il target bot
  try{ localStorage.setItem("shaq_global_lang",norm); }catch(e){}
  applyUILang(true);   // anima UI + GDPR nella nuova lingua
}

/* =====================================================================
   INGRESSO LINGUA: URL ?lang=  +  postMessage (bottone Wix)  +  localStorage
===================================================================== */
(function initLang(){
  let lang=null;
  const u=new URLSearchParams(location.search).get("lang");
  if(u) lang=u;
  if(!lang){ try{ lang=localStorage.getItem("shaq_global_lang"); }catch(e){} }
  if(!lang){ const p=browserPref(); lang=p[0]; }
  if(!LANG_NAMES[lang]){ const root=(lang||"es").split("-")[0];
    lang=Object.keys(LANG_NAMES).find(l=>l.startsWith(root))||"es-ES"; }
  currentLang=lang; selectedLang=lang;
})();

/* postMessage dal parent (se il call-agent è embeddato in Wix come iframe) */
window.addEventListener("message",ev=>{
  if(ev.origin && ALLOWED_ORIGINS.indexOf(ev.origin)===-1 && ev.origin!==window.location.origin) return;
  const d=ev.data; if(!d||!d.type) return;
  if(d.type==="VOICE_SET_LANG"||d.type==="PANEL_SET_LANG"||d.type==="CHANGE_LANG_SILENT"){
    setVoiceLang(d.lang,false);
  }
});

/* recupero animazione dopo background */
document.addEventListener("visibilitychange",()=>{ if(!document.hidden) snapToTarget(); });
window.addEventListener("focus",snapToTarget);

/* =====================================================================
   LOGIN GOOGLE (pattern collaudato) — verifica email prima di parlare
===================================================================== */
let googleVerifiedEmail = null;
let googleRawToken = null;
function decodeJwtPayload(token){
  try{
    const base64=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    const json=decodeURIComponent(atob(base64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    return JSON.parse(json);
  }catch(e){ return null; }
}
function handleGoogleCredential(response){
  const payload=decodeJwtPayload(response && response.credential);
  if(payload && payload.email && (payload.email_verified===true || payload.email_verified==='true')){
    googleVerifiedEmail=String(payload.email).trim().toLowerCase();
    googleRawToken=response.credential;  // token grezzo per verifica backend
    try{ sessionStorage.setItem('voice_google_token',googleRawToken); }catch(e){}
    const btn=$("gdpr-google-btn"), ok=$("gdpr-google-ok"), okEmail=$("gdpr-google-ok-email");
    if(btn) btn.style.display='none';
    if(okEmail) okEmail.innerText=googleVerifiedEmail;
    if(ok) ok.style.display='flex';
    try{ sessionStorage.setItem('voice_user_email',googleVerifiedEmail); }catch(e){}
  }
}
let googleBtnRendered=false;
function initGoogleButton(){
  if(googleBtnRendered) return;
  if(!(window.google && google.accounts && google.accounts.id)) return;
  try{
    google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:handleGoogleCredential,auto_select:false});
    const target=$("gdpr-google-btn");
    if(target){
      google.accounts.id.renderButton(target,{theme:'filled_black',size:'large',shape:'pill',text:'continue_with',width:280});
      googleBtnRendered=true;
    }
  }catch(e){}
}
function ensureGoogleButton(attempt){
  attempt=attempt||0;
  if(googleBtnRendered) return;
  initGoogleButton();
  if(!googleBtnRendered && attempt<20) setTimeout(()=>ensureGoogleButton(attempt+1),250);
}
function getVoiceUserEmail(){
  return (typeof googleVerifiedEmail==='string' && googleVerifiedEmail)
    ? googleVerifiedEmail
    : (sessionStorage.getItem('voice_user_email')||null);
}
// avvia il bottone all'apertura
ensureGoogleButton();

/* "Ahora no": messaggio di congedo, poi torna due pagine indietro.
   La prima indietro è concettuale (il GDPR, che non si rivede), la
   seconda riporta l'utente da dove era arrivato. */
$("gdprDecline").addEventListener("click",()=>{
  try{ parent.postMessage({type:"VOICE_DECLINED"},"*"); }catch(e){}
  // messaggio in "legalese" secco
  const g=gdprPack(currentLang);
  const msg=(g && g.declineMsg) ||
    "Sin su consentimiento no es posible iniciar la llamada de voz. La sesión se cerrará.";
  gdprEl.querySelector(".intro").textContent=msg;
  gdprEl.querySelector(".scroll").innerHTML="";
  $("gdpr-google-wrap").style.display="none";
  $("gdprAccept").style.display="none";
  $("gdprDecline").disabled=true;
  // due passi indietro nella cronologia del browser
  setTimeout(()=>{
    try{ history.go(-2); }catch(e){ try{ history.back(); }catch(_){} }
  },2200);
});

/* =====================================================================
   RATE LIMIT: schermata password (sblocco sviluppatori)
===================================================================== */
function showPasswordScreen(){
  callEl.classList.remove("show");
  gdprEl.classList.add("hide");
  $("pwdScreen").classList.remove("hide");
  const g=gdprPack(currentLang);
  $("pwdTitle").textContent=(g && g.pwdTitle) || "Tiempo agotado";
  $("pwdIntro").textContent=(g && g.pwdIntro) ||
    "Ha alcanzado el tiempo gratuito disponible. Introduzca una contraseña de acceso para continuar.";
  $("pwdBack").textContent=(g && g.decline) || "Volver";
  $("pwdError").classList.remove("visible");
  $("pwdInput").value="";
  setTimeout(()=>$("pwdInput").focus(),100);
}
function hidePasswordScreen(){
  $("pwdScreen").classList.add("hide");
}
$("pwdSubmit").addEventListener("click",async()=>{
  const pwd=$("pwdInput").value.trim();
  if(!pwd){ return; }
  try{
    const res=await fetch(`${BACKEND_URL}/api/unlock`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({password:pwd})
    });
    if(res.ok){
      hidePasswordScreen();
      callEl.classList.add("show");
      // riprova la chiamata: ora l'IP è sbloccato
      startCall();
    }else{
      const g=gdprPack(currentLang);
      $("pwdError").textContent=(g && g.pwdWrong) || "Contraseña no válida.";
      $("pwdError").classList.add("visible");
    }
  }catch(e){
    $("pwdError").textContent="Error de conexión.";
    $("pwdError").classList.add("visible");
  }
});
$("pwdInput").addEventListener("keydown",e=>{ if(e.key==="Enter") $("pwdSubmit").click(); });
$("pwdBack").addEventListener("click",()=>{
  hidePasswordScreen();
  try{ history.go(-2); }catch(e){ try{ history.back(); }catch(_){} }
});

/* =====================================================================
   CHIAMATA (Daily)
===================================================================== */
function showError(m){ errorBox.textContent=m; errorBox.classList.add("visible"); }
function clearError(){ errorBox.classList.remove("visible"); errorBox.textContent=""; }

function startTimer(){
  seconds=0;
  timerInterval=setInterval(()=>{
    seconds++;
    const mm=String(Math.floor(seconds/60)).padStart(2,"0");
    const ss=String(seconds%60).padStart(2,"0");
    timerEl.childNodes[0].nodeValue=mm+":"+ss+" ";
    // countdown icon: appare quando restano <=60s del tempo concesso
    // (callRemainingSec = secondi totali concessi per questa chiamata)
    if(callRemainingSec>0){
      const left=callRemainingSec-seconds;
      const ic=$("countdownIcon");
      if(left<=60 && left>0){ ic.style.display="inline"; ic.title=left+"s"; }
      else { ic.style.display="none"; }
    }
  },1000);
}
function stopTimer(){
  if(timerInterval)clearInterval(timerInterval); timerInterval=null;
  timerEl.childNodes[0].nodeValue="00:00 ";
  $("countdownIcon").style.display="none";
}

function setPhoneState(state){
  phoneBtn.classList.remove("connecting","hangup");
  if(state==="connecting"){ phoneBtn.classList.add("connecting"); phoneIco.textContent="📞"; }
  else if(state==="in-call"){ phoneBtn.classList.add("hangup"); phoneIco.textContent="📞"; }
  else { phoneIco.textContent="📞"; }
}
function showCallControls(show){
  muteBtn.classList.toggle("hidden",!show);
  speakerBtn.classList.toggle("hidden",!show);
}

function startMicCheck(){
  if(!callObject) return;
  try{
    callObject.startLocalAudioLevelObserver(100);
    callObject.on("local-audio-level",ev=>{
      const lvl=Math.round((ev.audioLevel||0)*100);
      if(lvl>1){ micStatus.textContent=t("micActive")+" ("+lvl+")"; micStatus.style.color="var(--cyan)"; }
      else{ micStatus.textContent=t("micSilent"); micStatus.style.color="var(--text-dim)"; }
    });
  }catch(e){ micStatus.textContent=t("micFail"); }
}
function stopMicCheck(){
  try{ if(callObject) callObject.stopLocalAudioLevelObserver(); }catch(e){}
  if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
  micStatus.textContent="MIC: —"; micStatus.style.color="var(--text-dim)";
}

function resetCallUI(){
  callActive=false; connecting=false;
  avatar.classList.remove("live"); wave.classList.remove("live");
  stopTimer(); stopMicCheck(); clearError();
  setPhoneState("idle"); showCallControls(false);
  statusText.textContent="\u2014";  /* fuori chiamata: niente "Conexión…" */
  isMuted=false; isSpeakerOn=true;
  muteBtn.classList.remove("muted"); speakerBtn.classList.add("active");
}

async function startCall(){
  if(callActive||connecting) return;
  connecting=true; clearError();
  setPhoneState("connecting");
  statusText.textContent=t("micWait");

  try{ micStream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(err){
    if(err.name==="NotAllowedError") showError(t("errMicDenied"));
    else showError(t("errCall"));
    setPhoneState("idle"); connecting=false; return;
  }

  statusText.textContent=t("creatingRoom");
  let roomUrl;
  try{
    const res=await fetch(`${BACKEND_URL}/api/start-call`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        tenant_slug:TENANT_SLUG,
        language:selectedLang,
        google_token:(googleRawToken||sessionStorage.getItem('voice_google_token')||null),
        user_email:getVoiceUserEmail()
      })
    });
    if(res.status===429){
      // tempo esaurito: mostra la schermata password invece di errore generico
      if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
      setPhoneState("idle"); connecting=false;
      showPasswordScreen();
      return;
    }
    if(!res.ok) throw new Error("backend "+res.status);
    const data=await res.json();
    roomUrl=data.room_url;
    callRemainingSec=(data.unlimited ? -1 : (data.remaining_sec||-1));
  }catch(err){ showError(t("errServer")); setPhoneState("idle"); connecting=false; return; }

  statusText.textContent=t("connecting");
  try{
    callObject=window.DailyIframe.createCallObject({videoSource:false});
    callObject
      .on("joined-meeting",()=>{
        trCallStart=new Date();
        connecting=false; callActive=true;
        setPhoneState("in-call"); showCallControls(true);
        statusText.textContent=t("listening");
        avatar.classList.add("live"); wave.classList.add("live");
        startTimer();
        const forceMic=()=>{ try{callObject.setLocalAudio(true);}catch(e){} };
        forceMic(); setTimeout(forceMic,500); setTimeout(forceMic,1500);
        startMicCheck();
      })
      .on("track-started",ev=>{
        if(ev.participant&&!ev.participant.local&&ev.track.kind==="audio"){
          remoteAudio.srcObject=new MediaStream([ev.track]);
          remoteAudio.muted=false; remoteAudio.volume=1.0;
          remoteAudio.play().catch(()=>{
            const unlock=()=>{ remoteAudio.play().catch(()=>{}); clearError();
              document.removeEventListener("click",unlock); };
            document.addEventListener("click",unlock);
          });
        }
      })
      .on("participant-updated",ev=>{
        const p=ev.participant;
        if(p&&!p.local&&p.tracks&&p.tracks.audio&&p.tracks.audio.persistentTrack&&!remoteAudio.srcObject){
          remoteAudio.srcObject=new MediaStream([p.tracks.audio.persistentTrack]);
          remoteAudio.play().catch(()=>{});
        }
      })
      // TRIGGER-DA-VOCE: il backend (plugin lang_detect) manda la lingua rilevata
      .on("app-message",ev=>{
        const d=ev&&ev.data;
        if(d&&d.type==="VOICE_LANG_DETECTED"&&d.lang){ setVoiceLang(d.lang,true); }
        // bottone "Torna da Shaq" (caso microfono muto a inizio chiamata)
        if(d&&d.type==="SHOW_SHAQ_BUTTON"){ showShaqButton(d.url||"https://www.shaq-os.com/"); }
        // il BOT ha deciso di chiudere la chiamata: riaggancia anche qui
        if(d&&d.type==="CALL_ENDED"){ endCall(); }
        // trascrizione live dal backend
        if(d&&d.type==="TRANSCRIPT"&&d.text){ trAdd(d.role==="user"?"user":"bot", d.text); }
      })
      .on("error",ev=>{ showError(t("errCall")); })
      .on("left-meeting",()=>{ resetCallUI(); });

    await callObject.join({url:roomUrl});
  }catch(err){ showError(t("errCall")); setPhoneState("idle"); connecting=false; }
}

async function endCall(){
  if(callObject){
    try{ await callObject.leave(); await callObject.destroy(); }catch(e){}
    callObject=null;
  }
  resetCallUI();
}

/* =====================================================================
   TRASCRIZIONE LIVE + PDF
   Le frasi arrivano dal backend via app-message {type:"TRANSCRIPT"}.
   Il pannello appare al primo messaggio; il PDF si genera nel browser
   (jsPDF caricata solo al click, zero impatto sul caricamento).
===================================================================== */
const trLines=[];            // {role:'user'|'bot', text, t:Date}
let trCallStart=null;

const TR_L={ // etichette localizzate (root lingua), fallback EN
  es:{tr:"Transcripción",pdf:"Descargar PDF",you:"Usted",empty:"La conversación aparecerá aquí…"},
  en:{tr:"Transcript",pdf:"Download PDF",you:"You",empty:"The conversation will appear here…"},
  it:{tr:"Trascrizione",pdf:"Scarica PDF",you:"Tu",empty:"La conversazione apparirà qui…"},
  fr:{tr:"Transcription",pdf:"Télécharger le PDF",you:"Vous",empty:"La conversation apparaîtra ici…"},
  de:{tr:"Transkript",pdf:"PDF herunterladen",you:"Sie",empty:"Das Gespräch erscheint hier…"},
  pt:{tr:"Transcrição",pdf:"Descarregar PDF",you:"Você",empty:"A conversa aparecerá aqui…"},
  nl:{tr:"Transcript",pdf:"PDF downloaden",you:"U",empty:"Het gesprek verschijnt hier…"},
  ca:{tr:"Transcripció",pdf:"Descarrega el PDF",you:"Vostè",empty:"La conversa apareixerà aquí…"},
  ru:{tr:"Транскрипция",pdf:"Скачать PDF",you:"Вы",empty:"Разговор появится здесь…"}
};
function trL(){ return TR_L[currentLang.split("-")[0]]||TR_L.en; }
function trApplyLang(){
  const L=trL();
  $("trToggleLabel").textContent=L.tr;
  $("trPdf").textContent=L.pdf;
  const e=$("trEmpty"); if(e) e.textContent=L.empty;
}
function trFmt(d){ const z=n=>(n<10?"0":"")+n; return z(d.getHours())+":"+z(d.getMinutes())+":"+z(d.getSeconds()); }

function trAdd(role,text){
  text=(text||"").trim(); if(!text) return;
  const last=trLines[trLines.length-1];
  if(last&&last.role===role&&last.text===text) return;   // dedupe
  const entry={role,text,t:new Date()}; trLines.push(entry);
  const body=$("trBody"); if(!body) return;
  const e=$("trEmpty"); if(e) e.remove();
  const div=document.createElement("div");
  div.className="tr-msg "+role;
  const who=document.createElement("span"); who.className="who";
  who.textContent=(role==="user"?trL().you:"Shaq-OS")+" · "+trFmt(entry.t);
  const sp=document.createElement("span"); sp.textContent=text;
  div.appendChild(who); div.appendChild(sp);
  body.appendChild(div); body.scrollTop=body.scrollHeight;
  $("trPdf").disabled=false;
  $("trToggle").style.display="inline-flex";
}

$("trToggle").addEventListener("click",()=>{ $("trPanel").classList.toggle("open"); });

function trLoadJsPDF(cb){
  if(window.jspdf&&window.jspdf.jsPDF) return cb();
  const sc=document.createElement("script");
  sc.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
  sc.onload=cb; sc.onerror=()=>alert(trL().pdf+": error");
  document.head.appendChild(sc);
}
$("trPdf").addEventListener("click",()=>{
  if(!trLines.length) return;
  trLoadJsPDF(()=>{
    try{
      const doc=new window.jspdf.jsPDF({unit:"mm",format:"a4"});
      const W=210,M=18,maxW=W-M*2; let y;
      const now=new Date();
      const dur=trCallStart?Math.floor((now-trCallStart)/1000):0;
      const mm=Math.floor(dur/60), ss=dur%60;
      doc.setFillColor(20,22,24); doc.rect(0,0,W,34,"F");
      doc.setTextColor(47,215,199); doc.setFont("courier","bold"); doc.setFontSize(9);
      doc.text("SHAQ-OS  ·  VOICE ASSISTANT",M,13);
      doc.setTextColor(244,241,233); doc.setFont("helvetica","bold"); doc.setFontSize(15);
      doc.text(trL().tr,M,22);
      doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(150,148,138);
      doc.text(now.toLocaleDateString()+"  ·  "+now.toLocaleTimeString()+
        (trCallStart?("  ·  "+mm+"m "+ss+"s"):""),M,29);
      y=44;
      trLines.forEach(L=>{
        const label=(L.role==="user"?trL().you.toUpperCase():"SHAQ-OS")+"  ·  "+trFmt(L.t);
        doc.setFont("courier","bold"); doc.setFontSize(8);
        if(L.role==="user") doc.setTextColor(20,140,128); else doc.setTextColor(90,90,90);
        if(y>275){doc.addPage();y=20;}
        doc.text(label,M,y); y+=4.5;
        doc.setFont("helvetica","normal"); doc.setFontSize(10.5); doc.setTextColor(35,35,35);
        doc.splitTextToSize(L.text,maxW).forEach(row=>{
          if(y>280){doc.addPage();y=20;}
          doc.text(row,M,y); y+=5.2;
        });
        y+=4;
      });
      const pages=doc.getNumberOfPages();
      for(let pg=1;pg<=pages;pg++){
        doc.setPage(pg);
        doc.setFont("courier","normal"); doc.setFontSize(7.5); doc.setTextColor(150,150,150);
        doc.text("Powered by Shaq-OS · "+pg+"/"+pages,M,292);
      }
      doc.save("shaq-os-"+now.toISOString().slice(0,10)+".pdf");
    }catch(e){ console.warn("PDF:",e); }
  });
});
trApplyLang();

/* il tasto cornetta: chiama se idle, riaggancia se in chiamata */
phoneBtn.addEventListener("click",()=>{
  if(callActive) endCall();
  else if(!connecting) startCall();
});
muteBtn.addEventListener("click",()=>{
  if(!callObject)return; isMuted=!isMuted; callObject.setLocalAudio(!isMuted);
  muteBtn.classList.toggle("muted",isMuted);
});
speakerBtn.addEventListener("click",()=>{
  isSpeakerOn=!isSpeakerOn; remoteAudio.muted=!isSpeakerOn;
  speakerBtn.classList.toggle("active",isSpeakerOn);
});

/* Animazione d'apertura: il titolo del GDPR compare "digitato".
   Parte solo se il GDPR è la schermata visibile (consenso non ancora dato). */
(function animateGdprOpen(){
  if(consentGiven) return;
  const g = gdprPack(currentLang); if(!g) return;
  const el = $("gdprTitle");
  const myRun = ++runId;
  el.textContent = "";
  // piccolo ritardo per far percepire l'ingresso
  requestAnimationFrame(()=>animateElement(el, g.title, myRun));
})();
